apiVersion: apps/v1
kind: Deployment
metadata:
  name: result
  labels:
    app: result
spec:
  replicas: 1
  selector:
    matchlables:
      app: result
  templates:
    metadata:
      name: result
      labels:
        app: result
  spec:
    containers:
      - name: result
        image: dockersamples/examplevotingapp_result
        ports:
          - containerPort: 80
            name: result